<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital - Mini-Soft Pro</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .category-header { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 20px; }
        .price { color: #28a745; font-weight: bold; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">🍽️ Nuestro Menú</h1>

        {% for category in categories %}
            <div class="category-header shadow-sm">
                <h2 class="h4 mb-0">{{ category.name }}</h2>
            </div>
            
            <div class="row mt-3">
                {% for item in category.items.all %}
                    {% if item.is_available %}
                    <div class="col-md-6 mb-3">
                        <div class="card h-100 border-0 shadow-sm">
                            {% if item.image %}
                                <img src="{{ item.image.url }}" class="card-img-top" alt="{{ item.name }}">
                            {% endif %}
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h5 class="card-title mb-1">{{ item.name }}</h5>
                                    <p class="card-text small text-muted">{{ item.description }}</p>
                                </div>
                                <span class="price h5">${{ item.price }}</span>
                            </div>
                        </div>
                    </div>
                    {% endif %}
                {% endfor %}
            </div>
        {% endfor %}
    </div>
</body>
</html>
