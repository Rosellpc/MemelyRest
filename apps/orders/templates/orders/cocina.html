<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Cocina - Live</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-1: #0b0b0f;
            --bg-2: #1a1014;
            --accent: #ff5a3d;
            --accent-2: #ffd166;
            --card: #15141b;
            --card-border: #242330;
            --text: #f4f4f7;
            --muted: #b4b6c2;
            --success: #29d391;
            --warning: #f4a261;
            --danger: #ff5a3d;
        }
        body {
            background: radial-gradient(1200px 600px at 10% 0%, #2a0f16 0%, var(--bg-1) 50%),
                        radial-gradient(1200px 600px at 100% 0%, #0b1f2a 0%, var(--bg-2) 50%);
            color: var(--text);
            font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
        }
        .top-bar {
            background: rgba(21, 20, 27, 0.9);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }
        .brand-title {
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 0 rgba(41, 211, 145, 0.6);
            animation: pulse 1.6s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(41, 211, 145, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(41, 211, 145, 0); }
            100% { box-shadow: 0 0 0 0 rgba(41, 211, 145, 0); }
        }
        .board {
            background: rgba(21, 20, 27, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 18px;
            margin-top: 18px;
        }
        .status-pill {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .pill-pending { background: rgba(255, 90, 61, 0.15); color: var(--danger); }
        .pill-preparing { background: rgba(255, 209, 102, 0.15); color: var(--accent-2); }
        .pill-delivered { background: rgba(41, 211, 145, 0.15); color: var(--success); }
        .refresh-note {
            color: var(--muted);
            font-size: 12px;
        }
        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="top-bar d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
            <div>
                <div class="text-uppercase text-muted small">Cocina en vivo</div>
                <h1 class="brand-title mb-1">Monitor de Pedidos</h1>
                <div class="refresh-note">Actualizacion automatica cada 5 segundos</div>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span class="pulse"></span>
                <span class="small text-muted">Sistema activo</span>
            </div>
            <div>
                <a class="btn btn-outline-light btn-sm" href="{% url 'stock_diario_cocina' %}">Stock diario</a>
            </div>
        </div>

        <div class="board">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex gap-2">
                    <span class="status-pill pill-pending">Pendiente</span>
                    <span class="status-pill pill-preparing">En cocina</span>
                    <span class="status-pill pill-delivered">Entregado</span>
                </div>
                <div class="refresh-note">Vista optimizada para cocina</div>
            </div>

            <div id="lista-pedidos" class="fade-in"
                 hx-get="{% url 'lista_pedidos_fragmento' %}"
                 hx-trigger="load, every 5s"
                 hx-swap="innerHTML">
                <p class="text-muted">Cargando pedidos...</p>
            </div>
        </div>
    </div>


    <div id="toast" class="toast-notify">Nuevo pedido recibido</div>

    <script>
        const seenOrders = new Set();
        const toast = document.getElementById('toast');

        function beep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.08;
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setTimeout(() => {
                    osc.stop();
                    ctx.close();
                }, 180);
            } catch (e) {
                // Sin audio disponible
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function detectNewOrders(silent = false) {
            const cards = document.querySelectorAll('.pedido-card[data-order-id]');
            const ids = Array.from(cards).map(c => c.getAttribute('data-order-id'));
            ids.forEach((id) => {
                if (!seenOrders.has(id)) {
                    seenOrders.add(id);
                    if (!silent) {
                        beep();
                        showToast(`Nuevo pedido #${id}`);
                    }
                }
            });
        }

        document.body.addEventListener('htmx:afterSwap', () => detectNewOrders(false));
        document.addEventListener('DOMContentLoaded', () => detectNewOrders(true));
    </script>

    <style>
        .toast-notify {
            position: fixed;
            right: 24px;
            bottom: 24px;
            background: rgba(21, 20, 27, 0.95);
            border: 1px solid #2a2935;
            color: #f4f4f7;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.2s ease;
            pointer-events: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .toast-notify.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</body>
</html>
