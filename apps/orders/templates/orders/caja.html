<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Caja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-1: #0c1116;
            --bg-2: #141a22;
            --accent: #00b4d8;
            --accent-2: #ffd166;
            --card: #171e27;
            --card-border: #26313d;
            --text: #f4f4f7;
            --muted: #9aa7b4;
            --success: #29d391;
            --danger: #ff5a3d;
        }
        body {
            background: radial-gradient(1200px 600px at 0% 0%, #0f2a2f 0%, var(--bg-1) 50%),
                        radial-gradient(1200px 600px at 100% 0%, #1d1f2b 0%, var(--bg-2) 50%);
            color: var(--text);
            font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
        }
        .top-bar {
            background: rgba(23, 30, 39, 0.95);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        }
        .board {
            background: rgba(23, 30, 39, 0.7);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 18px;
            margin-top: 18px;
        }
        .fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .refresh-note { color: var(--muted); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="top-bar d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
            <div>
                <div class="text-uppercase text-muted small">Caja</div>
                <h1 class="mb-1">Cobros y Tickets</h1>
                <div class="refresh-note">Actualizacion automatica cada 5 segundos</div>
            </div>
            <div class="refresh-note">Solo pedidos entregados</div>
        </div>

        <div class="board">
            <div id="lista-caja" class="fade-in"
                 hx-get="{% url 'lista_caja_fragmento' %}"
                 hx-trigger="load, every 5s"
                 hx-swap="innerHTML">
                <p class="text-muted">Cargando pedidos...</p>
            </div>
        </div>
    </div>
</body>
</html>
