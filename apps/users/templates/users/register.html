<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - memelyAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --night: #0f1217;
            --panel: #1b1f2a;
            --accent: #00b4d8;
            --text: #ffffff;
            --muted: #e6ebf5;
        }
        body {
            background: radial-gradient(1200px 600px at 0% 0%, #1b2a3a 0%, var(--night) 50%),
                        radial-gradient(1200px 600px at 100% 0%, #1d1f2b 0%, #171a22 50%);
            color: var(--text);
            font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
        }
        .card {
            background: rgba(31, 35, 46, 0.95);
            border: 1px solid #2c3342;
            border-radius: 18px;
        }
        .btn-primary { background: var(--accent); border: none; color: #0c0f14; font-weight: 700; }
        .text-muted { color: var(--muted) !important; }
        .form-label { color: #f6f7fb; }
        .form-control { color: #0c0f14; }
    </style>
</head>
<body>
    {% include 'partials/header.html' %}
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card p-4 shadow">
                    <h3 class="mb-2 text-light fw-bold">Crear cuenta</h3>
                    <p class="text-muted">Los nuevos registros se crean como clientes.</p>

                    {% if form.errors %}
                        <div class="alert alert-danger">{{ form.errors }}</div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="password1" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" name="password2" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Registrar</button>
                    </form>

                    <div class="mt-3 small text-muted">
                        ¿Ya tienes cuenta? <a href="/login/">Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
