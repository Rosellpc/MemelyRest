<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - memelyAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(1200px 600px at 0% 0%, #1b2a3a 0%, #0f1217 50%),
                        radial-gradient(1200px 600px at 100% 0%, #1d1f2b 0%, #171a22 50%);
            color: #f4f4f7;
            font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
        }
        .card {
            background: rgba(31, 35, 46, 0.95);
            border: 1px solid #2c3342;
            border-radius: 18px;
        }
        .btn-primary {
            background: #00b4d8;
            border: none;
        }
        .link-muted {
            color: #9aa3b2;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card p-4 shadow">
                    <h3 class="mb-3">memelyAI</h3>
                    <p class="link-muted">Inicia sesion para acceder a permisos.</p>

                    {% if form.errors %}
                        <div class="alert alert-danger">Usuario o contrasena incorrectos.</div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contrasena</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                    </form>

                    <div class="mt-3 small link-muted">
                        Accesos rapidos: <a class="link-muted" href="/cocina/">Cocina</a> | <a class="link-muted" href="/caja/">Caja</a> | <a class="link-muted" href="/pos/">POS</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
